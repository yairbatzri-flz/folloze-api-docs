<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Folloze API — Swagger UI</title>
<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  body { margin: 0; font-family: "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fafbfd; }
  .topbar {
    background: #ffffff;
    border-bottom: 1px solid #e6e8ee;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .topbar a {
    color: #6c4dff;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
  }
  .topbar a:hover { text-decoration: underline; }
  .topbar .title { font-weight: 700; font-size: 16px; color: #0d1117; }
  .topbar .spacer { flex: 1; }
  .swagger-ui .topbar { display: none; } /* hide Swagger's own topbar */
  .swagger-ui {
    font-family: "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .swagger-ui .info .title { font-family: inherit; }
  .swagger-ui code, .swagger-ui pre, .swagger-ui .microlight {
    font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace !important;
  }
  .swagger-ui .scheme-container { background: transparent; box-shadow: none; padding: 12px 0; }
  /* Tint operation accent to match the rest of the docs */
  .swagger-ui .opblock.opblock-get .opblock-summary-method  { background: #1e40af; }
  .swagger-ui .opblock.opblock-post .opblock-summary-method { background: #166534; }
  .swagger-ui .opblock.opblock-put .opblock-summary-method  { background: #92400e; }
</style>
</head>
<body>
  <div class="topbar">
    <span class="title">Folloze API · Swagger UI</span>
    <span class="spacer"></span>
    <a href="index.html">← Back to docs</a>
    <a href="redoc.html">View in Redoc</a>
    <a href="openapi.json" target="_blank">Download openapi.json</a>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
  <script>
    window.ui = SwaggerUIBundle({
      url: "openapi.json",
      dom_id: "#swagger-ui",
      deepLinking: true,
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
      plugins: [SwaggerUIBundle.plugins.DownloadUrl],
      layout: "BaseLayout",
      defaultModelsExpandDepth: 0,
      defaultModelExpandDepth: 2,
      docExpansion: "list",
      tryItOutEnabled: true,
      persistAuthorization: true
    });
  </script>
</body>
</html>
